<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Climaris | Login</title>
    <link rel="stylesheet" href="/web/login.css" />
  </head>
  <body>
    <main class="auth-layout">
      <section class="hero-panel">
        <div class="hero-content">
          <span class="brand-pill">Climaris</span>
          <h1>Bem-vindo de volta!</h1>
          <p>
            Acesse sua conta para gerenciar sua operação de climatização com
            mais rapidez e segurança.
          </p>
        </div>
      </section>

      <section class="form-panel">
        <div class="login-card">
          <h2>Entrar na sua conta</h2>
          <p class="subtitle">Use seu e-mail e senha cadastrados.</p>

          <form id="loginForm">
            <label for="email">E-mail</label>
            <input id="email" name="email" type="email" autocomplete="email" required />

            <label for="password">Senha</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />

            <button type="submit">Entrar</button>
          </form>

          <p id="message" class="message" aria-live="polite"></p>
          <p class="health-hint">
            <a href="/health" target="_blank" rel="noopener noreferrer">Status da API</a>
            <span class="health-hint-detail"> — use só o caminho <code>/health</code> após o domínio.</span>
          </p>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById("loginForm");
      const message = document.getElementById("message");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.textContent = "Entrando...";
        message.className = "message";

        const payload = {
          email: form.email.value.trim().toLowerCase(),
          password: form.password.value,
        };

        try {
          const response = await fetch("/api/v1/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const body = await response.json();
          if (!response.ok) {
            message.textContent = body?.error?.message || "Falha ao autenticar.";
            message.className = "message error";
            return;
          }

          localStorage.setItem("access_token", body.access_token);
          message.textContent = body.must_change_password
            ? "Login realizado. Você precisa trocar a senha temporária."
            : "Login realizado com sucesso.";
          message.className = "message success";
        } catch (error) {
          message.textContent = "Não foi possível conectar ao servidor.";
          message.className = "message error";
        }
      });
    </script>
  </body>
</html>
